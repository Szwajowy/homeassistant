blueprint:
  name: IKEA RODRET/TRADFRI - sterowanie oswietleniem (MQTT + ZHA)
  homeassistant:
    min_version: 2024.6.0
  description: >
    💡 Wygodne sterowanie oswietleniem pilotem IKEA RODRET lub TRADFRI.

    🔌 Obslugiwane integracje:
    - MQTT (np. Zigbee2MQTT)
    - ZHA

    ⚙️ Domyslne zachowanie przyciskow:
    - 1x ON: wlacza swiatlo
    - 1x OFF: wylacza swiatlo
    - przytrzymanie ON: rozjasnia krokowo
    - przytrzymanie OFF: sciemnia krokowo (bez gaszenia przy minimalnej jasnosci)

    🧩 Akcje dodatkowe:
    - 2x ON/OFF: w pelni konfigurowalne
    - 3x ON/OFF: w pelni konfigurowalne

    ✅ Mozesz sterowac pojedynczym swiatlem, grupa swiatel lub area.
    ℹ️ Klikniecia 2x/3x dzialaja tylko wtedy, gdy Twoj pilot i integracja je raportuja.
  domain: automation
  input:
    integration_section:
      name: Integracja i pilot
      icon: mdi:remote
      description: Wybierz integracje oraz odpowiadajace jej urzadzenie pilota IKEA.
      input:
        controller_integration:
          name: Integracja pilota
          description: Wybierz integracje, z ktorej korzysta pilot.
          default: mqtt
          selector:
            select:
              options:
                - label: MQTT (np. Zigbee2MQTT)
                  value: mqtt
                - label: ZHA
                  value: zha

        remote_device_mqtt:
          name: Pilot IKEA (MQTT)
          description: Wybierz urzadzenie pilota z MQTT. Uzywane tylko w trybie MQTT.
          default: ""
          selector:
            device:
              integration: mqtt

        remote_device_zha:
          name: Pilot IKEA (ZHA)
          description: Wybierz urzadzenie pilota z ZHA. Uzywane tylko w trybie ZHA.
          default: ""
          selector:
            device:
              integration: zha

    target_section:
      name: Cel sterowania
      icon: mdi:lightbulb-group
      description: Wybierz, czym pilot ma sterowac.
      input:
        light_target:
          name: Cel swiatla
          description: Moze to byc pojedyncze swiatlo, grupa swiatel (light.*) lub area.
          selector:
            target:
              entity:
                domain: light

    dimming_section:
      name: Jasnosc i tempo
      icon: mdi:brightness-6
      description: Ustawienia sciemniania i rozjasniania podczas przytrzymania przyciskow.
      input:
        dim_step_pct:
          name: Krok zmiany jasnosci (%)
          description: O ile procent zmieniac jasnosc przy jednym kroku przytrzymania.
          default: 5
          selector:
            number:
              min: 1
              max: 25
              step: 1
              unit_of_measurement: "%"
              mode: slider

        dim_interval_ms:
          name: Tempo zmiany (ms)
          description: Co ile ms wykonywac kolejny krok jasnosci podczas przytrzymania.
          default: 180
          selector:
            number:
              min: 50
              max: 1000
              step: 10
              unit_of_measurement: ms
              mode: slider

        startup_brightness_pct:
          name: Jasnosc startowa przy hold ON z wylaczonego (%)
          description: Gdy swiatlo jest off i przytrzymasz ON, najpierw wlaczy sie z ta jasnoscia.
          default: 1
          selector:
            number:
              min: 1
              max: 30
              step: 1
              unit_of_measurement: "%"
              mode: slider

        min_brightness_pct:
          name: Minimalna jasnosc ochronna (%)
          description: Gdy sciemnianie zejdzie do minimum, swiatlo nie bedzie wylaczane.
          default: 1
          selector:
            number:
              min: 1
              max: 20
              step: 1
              unit_of_measurement: "%"
              mode: slider

    actions_section:
      name: Akcje dodatkowe
      icon: mdi:gesture-double-tap
      description: Akcje wykonywane po 2x i 3x kliknieciu ON/OFF (jesli pilot raportuje te zdarzenia).
      collapsed: true
      input:
        on_double_action:
          name: Akcja po 2x ON
          default: []
          selector:
            action: {}

        off_double_action:
          name: Akcja po 2x OFF
          default: []
          selector:
            action: {}

        on_triple_action:
          name: Akcja po 3x ON
          default: []
          selector:
            action: {}

        off_triple_action:
          name: Akcja po 3x OFF
          default: []
          selector:
            action: {}

mode: restart
max_exceeded: silent

variables:
  controller_integration: !input controller_integration
  is_mqtt: "{{ controller_integration == 'mqtt' }}"
  is_zha: "{{ controller_integration == 'zha' }}"
  dim_step_pct: !input dim_step_pct
  dim_interval_ms: !input dim_interval_ms
  startup_brightness_pct: !input startup_brightness_pct
  min_brightness_pct: !input min_brightness_pct

trigger:
  - platform: device
    domain: mqtt
    device_id: !input remote_device_mqtt
    type: action
    subtype: "on"
    id: on_single
    enabled: "{{ is_mqtt }}"

  - platform: device
    domain: mqtt
    device_id: !input remote_device_mqtt
    type: action
    subtype: "off"
    id: off_single
    enabled: "{{ is_mqtt }}"

  - platform: device
    domain: mqtt
    device_id: !input remote_device_mqtt
    type: action
    subtype: "brightness_move_up"
    id: on_hold
    enabled: "{{ is_mqtt }}"

  - platform: device
    domain: mqtt
    device_id: !input remote_device_mqtt
    type: action
    subtype: "brightness_move_down"
    id: off_hold
    enabled: "{{ is_mqtt }}"

  - platform: device
    domain: mqtt
    device_id: !input remote_device_mqtt
    type: action
    subtype: "on_double"
    id: on_double
    enabled: "{{ is_mqtt }}"

  - platform: device
    domain: mqtt
    device_id: !input remote_device_mqtt
    type: action
    subtype: "off_double"
    id: off_double
    enabled: "{{ is_mqtt }}"

  - platform: device
    domain: mqtt
    device_id: !input remote_device_mqtt
    type: action
    subtype: "on_triple"
    id: on_triple
    enabled: "{{ is_mqtt }}"

  - platform: device
    domain: mqtt
    device_id: !input remote_device_mqtt
    type: action
    subtype: "off_triple"
    id: off_triple
    enabled: "{{ is_mqtt }}"

  - platform: device
    domain: zha
    device_id: !input remote_device_zha
    type: remote_button_short_press
    subtype: turn_on
    id: on_single
    enabled: "{{ is_zha }}"

  - platform: device
    domain: zha
    device_id: !input remote_device_zha
    type: remote_button_short_press
    subtype: turn_off
    id: off_single
    enabled: "{{ is_zha }}"

  - platform: device
    domain: zha
    device_id: !input remote_device_zha
    type: remote_button_long_press
    subtype: dim_up
    id: on_hold
    enabled: "{{ is_zha }}"

  - platform: device
    domain: zha
    device_id: !input remote_device_zha
    type: remote_button_long_press
    subtype: dim_down
    id: off_hold
    enabled: "{{ is_zha }}"

  - platform: device
    domain: zha
    device_id: !input remote_device_zha
    type: remote_button_double_press
    subtype: turn_on
    id: on_double
    enabled: "{{ is_zha }}"

  - platform: device
    domain: zha
    device_id: !input remote_device_zha
    type: remote_button_double_press
    subtype: turn_off
    id: off_double
    enabled: "{{ is_zha }}"

  - platform: device
    domain: zha
    device_id: !input remote_device_zha
    type: remote_button_triple_press
    subtype: turn_on
    id: on_triple
    enabled: "{{ is_zha }}"

  - platform: device
    domain: zha
    device_id: !input remote_device_zha
    type: remote_button_triple_press
    subtype: turn_off
    id: off_triple
    enabled: "{{ is_zha }}"

condition: []

action:
  - choose:
      - conditions:
          - condition: trigger
            id: on_single
        sequence:
          - service: light.turn_on
            target: !input light_target

      - conditions:
          - condition: trigger
            id: off_single
        sequence:
          - service: light.turn_off
            target: !input light_target

      - conditions:
          - condition: trigger
            id: on_hold
        sequence:
          - service: light.turn_on
            target: !input light_target
            data:
              brightness_pct: !input startup_brightness_pct
          - repeat:
              sequence:
                - service: light.turn_on
                  target: !input light_target
                  data:
                    brightness_step_pct: !input dim_step_pct
                - wait_for_trigger:
                    - platform: device
                      domain: mqtt
                      device_id: !input remote_device_mqtt
                      type: action
                      subtype: "brightness_stop"
                      enabled: "{{ is_mqtt }}"
                    - platform: device
                      domain: zha
                      device_id: !input remote_device_zha
                      type: remote_button_long_release
                      subtype: dim_up
                      enabled: "{{ is_zha }}"
                  timeout:
                    milliseconds: !input dim_interval_ms
                  continue_on_timeout: true
                - if:
                    - condition: template
                      value_template: "{{ wait.trigger is not none }}"
                  then:
                    - stop: "Zatrzymano rozjasnianie (zwolniono przycisk)."

      - conditions:
          - condition: trigger
            id: off_hold
        sequence:
          - service: light.turn_on
            target: !input light_target
            data:
              brightness_step_pct: "{{ (dim_step_pct | int) * -1 }}"
          - repeat:
              sequence:
                - service: light.turn_on
                  target: !input light_target
                  data:
                    brightness_step_pct: "{{ (dim_step_pct | int) * -1 }}"
                - service: light.turn_on
                  target: !input light_target
                  data:
                    brightness_pct: !input min_brightness_pct
                - wait_for_trigger:
                    - platform: device
                      domain: mqtt
                      device_id: !input remote_device_mqtt
                      type: action
                      subtype: "brightness_stop"
                      enabled: "{{ is_mqtt }}"
                    - platform: device
                      domain: zha
                      device_id: !input remote_device_zha
                      type: remote_button_long_release
                      subtype: dim_down
                      enabled: "{{ is_zha }}"
                  timeout:
                    milliseconds: !input dim_interval_ms
                  continue_on_timeout: true
                - if:
                    - condition: template
                      value_template: "{{ wait.trigger is not none }}"
                  then:
                    - stop: "Zatrzymano sciemnianie (zwolniono przycisk)."

      - conditions:
          - condition: trigger
            id: on_double
        sequence: !input on_double_action

      - conditions:
          - condition: trigger
            id: off_double
        sequence: !input off_double_action

      - conditions:
          - condition: trigger
            id: on_triple
        sequence: !input on_triple_action

      - conditions:
          - condition: trigger
            id: off_triple
        sequence: !input off_triple_action
