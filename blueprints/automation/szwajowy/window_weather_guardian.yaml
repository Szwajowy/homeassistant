trigger_variables:
  v_window_sensors_input: !input window_sensors
  v_weather_entity_input: !input weather_entity
  v_night_schedule_entities_input: !input night_schedule_entities
  v_night_override_entity_input: !input night_override_entity

triggers:
  - trigger: template
    value_template: "{{ expand(v_window_sensors_input) | selectattr('state', 'in', ['on', 'open', 'tilted']) | list | length > 0 }}"
    for:
      seconds: !input window_open_debounce_seconds
    id: windows_open

  - trigger: template
    value_template: "{{ expand(v_window_sensors_input) | selectattr('state', 'in', ['on', 'open', 'tilted']) | list | length == 0 }}"
    id: windows_closed

  - trigger: template
    value_template: >
      {% set someone_home = (people_entities_input | length > 0) and ((people_entities_input | select('is_state', 'home') | list | length) > 0) %}
      {% set away_override_on = away_override_entity_input not in ['', none] and states(away_override_entity_input) in ['on', 'true', 'home'] %}
      {% set away_active = away_alert_enabled_input and (((people_entities_input | length > 0) and not someone_home) or away_override_on) %}
      {% set open_count = expand(window_sensors_input) | selectattr('state', 'in', ['on', 'open', 'tilted']) | list | length %}
      {{ away_active and open_count > 0 }}
    id: away_open
    variables:
      people_entities_input: !input people_entities
      away_override_entity_input: !input away_override_entity
      away_alert_enabled_input: !input away_alert_enabled
      window_sensors_input: !input window_sensors

  - trigger: template
    value_template: >
      {% set open_count = expand(window_sensors_input) | selectattr('state', 'in', ['on', 'open', 'tilted']) | list | length %}
      {% set night_override = night_override_entity_input not in ['', none] and states(night_override_entity_input) in ['on', 'true', 'home'] %}
      {% set night_schedule_on = (night_schedule_entities_input | select('is_state', 'on') | list | length) > 0 %}
      {% set night_fallback = now().hour >= 22 or now().hour < 6 %}
      {% set night_active = night_override or night_schedule_on or ((night_schedule_entities_input | length == 0 and night_override_entity_input in ['', none]) and night_fallback) %}
      {% set weather_ok = weather_entity_input not in ['', none] %}
      {% set now_condition = states(weather_entity_input) if weather_ok else '' %}
      {% set rain_now = rain_enabled_input and now_condition in ['rainy', 'pouring', 'lightning-rainy', 'hail'] %}
      {% set snow_now = snow_enabled_input and now_condition in ['snowy', 'snowy-rainy'] %}
      {% set ns = namespace(forecast_precip=false) %}
      {% set forecast = state_attr(weather_entity_input, 'forecast') if weather_ok else [] %}
      {% if forecast is iterable %}
        {% for item in forecast %}
          {% set cond = item.condition | default('') %}
          {% set fdt = item.datetime | default(item.forecast_time | default(item.time | default(''))) %}
          {% set delta = ((as_timestamp(fdt, 0) - as_timestamp(now())) / 60) | int(99999) %}
          {% if delta >= 0 and delta <= horizon_input | int(0) %}
            {% if rain_enabled_input and cond in ['rainy', 'pouring', 'lightning-rainy', 'hail'] %}
              {% set ns.forecast_precip = true %}
            {% endif %}
            {% if snow_enabled_input and cond in ['snowy', 'snowy-rainy'] %}
              {% set ns.forecast_precip = true %}
            {% endif %}
          {% endif %}
        {% endfor %}
      {% endif %}
      {% set precip = rain_now or snow_now or ns.forecast_precip %}
      {{ open_count > 0 and weather_ok and precip and ((not precip_night_only_input) or night_active) }}
    id: precip_risk
    variables:
      window_sensors_input: !input window_sensors
      weather_entity_input: !input weather_entity
      rain_enabled_input: !input rain_alert_enabled
      snow_enabled_input: !input snow_alert_enabled
      horizon_input: !input forecast_horizon_minutes
      precip_night_only_input: !input precip_night_only
      night_schedule_entities_input: !input night_schedule_entities
      night_override_entity_input: !input night_override_entity

  - trigger: template
    value_template: >
      {% set open_count = expand(window_sensors_input) | selectattr('state', 'in', ['on', 'open', 'tilted']) | list | length %}
      {% set indoor_t = states(indoor_temperature_sensor_input) | float(9999) %}
      {% set outdoor_t = states(outdoor_temperature_sensor_input) | float(9999) %}
      {% set indoor_h = states(indoor_humidity_sensor_input) | float(9999) %}
      {% set outdoor_h = states(outdoor_humidity_sensor_input) | float(9999) %}
      {% set co2 = states(co2_sensor_input) | float(0) %}
      {% set has_temp = indoor_temperature_sensor_input not in ['', none] and outdoor_temperature_sensor_input not in ['', none] and indoor_t != 9999 and outdoor_t != 9999 %}
      {% set has_hum = indoor_humidity_sensor_input not in ['', none] and outdoor_humidity_sensor_input not in ['', none] and indoor_h != 9999 and outdoor_h != 9999 %}
      {% set temp_open = has_temp and (indoor_t - outdoor_t) >= min_temp_delta_open_input | float(0) %}
      {% set hum_open = has_hum and (indoor_h - outdoor_h) >= min_humidity_delta_open_input | float(0) %}
      {% set co2_open = co2_sensor_input not in ['', none] and co2 >= co2_high_ppm_input | float(0) %}
      {{ advisor_enabled_input and open_count == 0 and (temp_open or hum_open or co2_open) }}
    for:
      minutes: !input advisor_stability_minutes
    id: advisor_open
    variables:
      advisor_enabled_input: !input advisor_enabled
      window_sensors_input: !input window_sensors
      indoor_temperature_sensor_input: !input indoor_temperature_sensor
      outdoor_temperature_sensor_input: !input outdoor_temperature_sensor
      indoor_humidity_sensor_input: !input indoor_humidity_sensor
      outdoor_humidity_sensor_input: !input outdoor_humidity_sensor
      co2_sensor_input: !input co2_sensor
      co2_high_ppm_input: !input co2_high_ppm
      min_temp_delta_open_input: !input min_temp_delta_open
      min_humidity_delta_open_input: !input min_humidity_delta_open

  - trigger: template
    value_template: >
      {% set open_count = expand(window_sensors_input) | selectattr('state', 'in', ['on', 'open', 'tilted']) | list | length %}
      {% set indoor_t = states(indoor_temperature_sensor_input) | float(9999) %}
      {% set outdoor_t = states(outdoor_temperature_sensor_input) | float(9999) %}
      {% set has_temp = indoor_temperature_sensor_input not in ['', none] and outdoor_temperature_sensor_input not in ['', none] and indoor_t != 9999 and outdoor_t != 9999 %}
      {% set allow_heat = allow_warm_if_indoor_cold_input and has_temp and indoor_t <= indoor_cold_threshold_input | float(0) %}
      {% set avoid = has_temp and (outdoor_t - indoor_t) >= max_temp_delta_avoid_input | float(0) %}
      {{ advisor_enabled_input and open_count > 0 and avoid and not allow_heat }}
    for:
      minutes: !input advisor_stability_minutes
    id: advisor_avoid
    variables:
      advisor_enabled_input: !input advisor_enabled
      window_sensors_input: !input window_sensors
      indoor_temperature_sensor_input: !input indoor_temperature_sensor
      outdoor_temperature_sensor_input: !input outdoor_temperature_sensor
      max_temp_delta_avoid_input: !input max_temp_delta_avoid
      allow_warm_if_indoor_cold_input: !input allow_warm_if_indoor_cold
      indoor_cold_threshold_input: !input indoor_cold_threshold

  - trigger: time
    at: !input night_summary_time
    id: night_summary

conditions: []

actions:
  - variables:
      v_enable_logging: !input enable_logging

      v_window_sensors: !input window_sensors
      v_weather_entity: !input weather_entity
      v_notify_entities: !input notify_entities

      v_notify_precip_enabled: !input notify_precip_enabled
      v_notify_away_enabled: !input notify_away_enabled
      v_notify_advisor_enabled: !input notify_advisor_enabled
      v_notify_night_summary_enabled: !input notify_night_summary_enabled

      v_quiet_enabled: !input quiet_enabled
      v_quiet_entity: !input quiet_entity
      v_quiet_schedule_entities: !input quiet_schedule_entities
      v_allow_precip_in_quiet: !input allow_precip_in_quiet
      v_allow_away_in_quiet: !input allow_away_in_quiet
      v_allow_advisor_in_quiet: !input allow_advisor_in_quiet
      v_allow_summary_in_quiet: !input allow_summary_in_quiet

      v_tts_enabled: !input tts_enabled
      v_tts_engine_entity: !input tts_engine_entity
      v_tts_media_player_entity: !input tts_media_player_entity
      v_tts_schedule_entities: !input tts_schedule_entities
      v_tts_precip_enabled: !input tts_precip_enabled
      v_tts_away_enabled: !input tts_away_enabled
      v_tts_advisor_enabled: !input tts_advisor_enabled
      v_tts_summary_enabled: !input tts_summary_enabled

      v_precip_title: !input precip_title
      v_precip_message: !input precip_message
      v_away_title: !input away_title
      v_away_message: !input away_message
      v_advisor_open_title: !input advisor_open_title
      v_advisor_open_message: !input advisor_open_message
      v_advisor_avoid_title: !input advisor_avoid_title
      v_advisor_avoid_message: !input advisor_avoid_message
      v_night_summary_title: !input night_summary_title
      v_night_summary_message: !input night_summary_message

      v_indoor_temperature_sensor: !input indoor_temperature_sensor
      v_outdoor_temperature_sensor: !input outdoor_temperature_sensor
      v_indoor_humidity_sensor: !input indoor_humidity_sensor
      v_outdoor_humidity_sensor: !input outdoor_humidity_sensor
      v_co2_sensor: !input co2_sensor

      open_windows_entities: >
        {% set ns = namespace(lst=[]) %}
        {% for e in expand(v_window_sensors) %}
          {% if e.state in ['on', 'open', 'tilted'] %}
            {% set ns.lst = ns.lst + [e.entity_id] %}
          {% endif %}
        {% endfor %}
        {{ ns.lst }}
      open_windows_names: >
        {% set ns = namespace(lst=[]) %}
        {% for e in expand(v_window_sensors) %}
          {% if e.state in ['on', 'open', 'tilted'] %}
            {% set ns.lst = ns.lst + [e.name if e.name is not none else e.entity_id] %}
          {% endif %}
        {% endfor %}
        {{ ns.lst }}
      open_windows_count: "{{ open_windows_names | length }}"
      open_windows_text: "{{ open_windows_names | join(', ') if (open_windows_names | length) > 0 else 'brak' }}"

      quiet_by_entity: >
        {% if v_quiet_entity in ['', none] %}
          false
        {% else %}
          {{ states(v_quiet_entity) in ['on', 'true', 'home'] }}
        {% endif %}
      quiet_by_schedule: "{{ (v_quiet_schedule_entities | select('is_state', 'on') | list | length) > 0 }}"
      quiet_active: "{{ v_quiet_enabled and (quiet_by_entity or quiet_by_schedule) }}"

      notify_precip_allowed: "{{ v_notify_precip_enabled and ((not quiet_active) or v_allow_precip_in_quiet) }}"
      notify_away_allowed: "{{ v_notify_away_enabled and ((not quiet_active) or v_allow_away_in_quiet) }}"
      notify_advisor_allowed: "{{ v_notify_advisor_enabled and ((not quiet_active) or v_allow_advisor_in_quiet) }}"
      notify_summary_allowed: "{{ v_notify_night_summary_enabled and ((not quiet_active) or v_allow_summary_in_quiet) }}"

      tts_schedule_ok: >
        {% if v_tts_schedule_entities | length == 0 %}
          true
        {% else %}
          {{ (v_tts_schedule_entities | select('is_state', 'on') | list | length) > 0 }}
        {% endif %}
      tts_common_allowed: >
        {{ v_tts_enabled and tts_schedule_ok and v_tts_engine_entity not in ['', none] and v_tts_media_player_entity not in ['', none] }}

      indoor_t: "{{ states(v_indoor_temperature_sensor) | float(9999) if v_indoor_temperature_sensor not in ['', none] else 9999 }}"
      outdoor_t: "{{ states(v_outdoor_temperature_sensor) | float(9999) if v_outdoor_temperature_sensor not in ['', none] else 9999 }}"
      indoor_h: "{{ states(v_indoor_humidity_sensor) | float(9999) if v_indoor_humidity_sensor not in ['', none] else 9999 }}"
      outdoor_h: "{{ states(v_outdoor_humidity_sensor) | float(9999) if v_outdoor_humidity_sensor not in ['', none] else 9999 }}"
      co2_value: "{{ states(v_co2_sensor) | int(0) if v_co2_sensor not in ['', none] else 0 }}"
      delta_temp: "{{ (indoor_t | float(0) - outdoor_t | float(0)) | round(1) if indoor_t != 9999 and outdoor_t != 9999 else 0 }}"
      delta_humidity: "{{ (indoor_h | float(0) - outdoor_h | float(0)) | round(0) if indoor_h != 9999 and outdoor_h != 9999 else 0 }}"

      main_tag: >
        {% set base = (v_window_sensors[0] if (v_window_sensors | length) > 0 else 'window') | string %}
        window_guardian_main_{{ base | replace('.', '_') | replace(' ', '_') }}
      critical_tag: >
        {% set base = (v_window_sensors[0] if (v_window_sensors | length) > 0 else 'window') | string %}
        window_guardian_critical_{{ base | replace('.', '_') | replace(' ', '_') }}

  - if: "{{ v_enable_logging }}"
    then:
      - action: logbook.log
        data:
          name: "🪟 Window Guardian"
          message: "Trigger: {{ trigger.id }} | open_windows: {{ open_windows_count }} | quiet: {{ quiet_active }}"

  - choose:
      - conditions:
          - "{{ trigger.id == 'precip_risk' }}"
          - "{{ notify_precip_allowed }}"
          - "{{ open_windows_count | int(0) > 0 }}"
        sequence:
          - variables:
              title_rendered: "{{ v_precip_title }}"
              message_rendered: >
                {% set t = v_precip_message %}
                {% set t = t | replace('{windows}', open_windows_text) %}
                {% set t = t | replace('{count}', open_windows_count | string) %}
                {{ t }}

          - repeat:
              for_each: "{{ v_notify_entities }}"
              sequence:
                - action: notify.send_message
                  continue_on_error: true
                  target:
                    entity_id: "{{ repeat.item }}"
                  data:
                    title: "{{ title_rendered }}"
                    message: "{{ message_rendered }}"
                    data:
                      tag: "{{ critical_tag }}"
                      group: window_critical

          - if: "{{ tts_common_allowed and v_tts_precip_enabled }}"
            then:
              - action: tts.speak
                continue_on_error: true
                target:
                  entity_id: "{{ v_tts_engine_entity }}"
                data:
                  media_player_entity_id: "{{ v_tts_media_player_entity }}"
                  message: "{{ message_rendered }}"

      - conditions:
          - "{{ trigger.id == 'away_open' }}"
          - "{{ notify_away_allowed }}"
          - "{{ open_windows_count | int(0) > 0 }}"
        sequence:
          - variables:
              title_rendered: "{{ v_away_title }}"
              message_rendered: >
                {% set t = v_away_message %}
                {% set t = t | replace('{windows}', open_windows_text) %}
                {% set t = t | replace('{count}', open_windows_count | string) %}
                {{ t }}

          - repeat:
              for_each: "{{ v_notify_entities }}"
              sequence:
                - action: notify.send_message
                  continue_on_error: true
                  target:
                    entity_id: "{{ repeat.item }}"
                  data:
                    title: "{{ title_rendered }}"
                    message: "{{ message_rendered }}"
                    data:
                      tag: "{{ main_tag }}"
                      group: window_main

          - if: "{{ tts_common_allowed and v_tts_away_enabled }}"
            then:
              - action: tts.speak
                continue_on_error: true
                target:
                  entity_id: "{{ v_tts_engine_entity }}"
                data:
                  media_player_entity_id: "{{ v_tts_media_player_entity }}"
                  message: "{{ message_rendered }}"

      - conditions:
          - "{{ trigger.id == 'advisor_open' }}"
          - "{{ notify_advisor_allowed }}"
        sequence:
          - variables:
              title_rendered: "{{ v_advisor_open_title }}"
              message_rendered: >
                {% set t = v_advisor_open_message %}
                {% set t = t | replace('{delta_temp}', delta_temp | string) %}
                {% set t = t | replace('{delta_humidity}', delta_humidity | string) %}
                {% set t = t | replace('{co2}', co2_value | string) %}
                {{ t }}

          - repeat:
              for_each: "{{ v_notify_entities }}"
              sequence:
                - action: notify.send_message
                  continue_on_error: true
                  target:
                    entity_id: "{{ repeat.item }}"
                  data:
                    title: "{{ title_rendered }}"
                    message: "{{ message_rendered }}"
                    data:
                      tag: "{{ main_tag }}"
                      group: window_main

          - if: "{{ tts_common_allowed and v_tts_advisor_enabled }}"
            then:
              - action: tts.speak
                continue_on_error: true
                target:
                  entity_id: "{{ v_tts_engine_entity }}"
                data:
                  media_player_entity_id: "{{ v_tts_media_player_entity }}"
                  message: "{{ message_rendered }}"

      - conditions:
          - "{{ trigger.id == 'advisor_avoid' }}"
          - "{{ notify_advisor_allowed }}"
          - "{{ open_windows_count | int(0) > 0 }}"
        sequence:
          - variables:
              title_rendered: "{{ v_advisor_avoid_title }}"
              message_rendered: >
                {% set t = v_advisor_avoid_message %}
                {% set t = t | replace('{delta_temp}', ((outdoor_t | float(0) - indoor_t | float(0)) | round(1)) | string) %}
                {% set t = t | replace('{windows}', open_windows_text) %}
                {% set t = t | replace('{count}', open_windows_count | string) %}
                {{ t }}

          - repeat:
              for_each: "{{ v_notify_entities }}"
              sequence:
                - action: notify.send_message
                  continue_on_error: true
                  target:
                    entity_id: "{{ repeat.item }}"
                  data:
                    title: "{{ title_rendered }}"
                    message: "{{ message_rendered }}"
                    data:
                      tag: "{{ main_tag }}"
                      group: window_main

          - if: "{{ tts_common_allowed and v_tts_advisor_enabled }}"
            then:
              - action: tts.speak
                continue_on_error: true
                target:
                  entity_id: "{{ v_tts_engine_entity }}"
                data:
                  media_player_entity_id: "{{ v_tts_media_player_entity }}"
                  message: "{{ message_rendered }}"

      - conditions:
          - "{{ trigger.id == 'night_summary' }}"
          - "{{ notify_summary_allowed }}"
        sequence:
          - variables:
              title_rendered: "{{ v_night_summary_title }}"
              message_rendered: >
                {% set t = v_night_summary_message %}
                {% set t = t | replace('{windows}', open_windows_text) %}
                {% set t = t | replace('{count}', open_windows_count | string) %}
                {{ t }}

          - repeat:
              for_each: "{{ v_notify_entities }}"
              sequence:
                - action: notify.send_message
                  continue_on_error: true
                  target:
                    entity_id: "{{ repeat.item }}"
                  data:
                    title: "{{ title_rendered }}"
                    message: "{{ message_rendered }}"
                    data:
                      tag: "{{ main_tag }}"
                      group: window_main

          - if: "{{ tts_common_allowed and v_tts_summary_enabled }}"
            then:
              - action: tts.speak
                continue_on_error: true
                target:
                  entity_id: "{{ v_tts_engine_entity }}"
                data:
                  media_player_entity_id: "{{ v_tts_media_player_entity }}"
                  message: "{{ message_rendered }}"

mode: parallel
max: 20
max_exceeded: silent
