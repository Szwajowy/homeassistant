blueprint:
  name: "🪟 Strażnik Okien — pogoda, obecność i doradca wietrzenia"
  description: |
    ## 🪟 Inteligentny blueprint okienny

    Monitoruje czujniki okien i wysyła podpowiedzi lub alerty w oparciu o pogodę,
    obecność domowników i parametry powietrza.

    ## ⚡ Funkcje V1
    - 🌧️ Alert: noc + opady (deszcz/śnieg) + otwarte okna
    - 🏝️ Alert: wszyscy poza domem + otwarte okna
    - 🌡️ Doradca: otworzyć / zamknąć okno na podstawie temperatury
    - 💧 Opcjonalna korekta doradcy o wilgotność
    - 🫁 Opcjonalna korekta doradcy o CO2
    - 🌙 Nocny raport otwartych okien
    - 📨 Notify entities z nadpisywaniem (tag/topic)
    - 😴 Opcjonalne drzemka / odrzuć dla alertów niekrytycznych
    - 🔕 Konfigurowalna cisza przez schedule/entity + wyjątki
    - 🔊 Opcjonalny TTS z własnym harmonogramem

    ## ℹ️ Wskazówki
    - Krytyczne alerty pogodowe mają osobny tag niż komunikaty doradcy/obecności.
    - Jeśli nie ustawisz opcji dodatkowych (wilgotność/CO2), doradca działa tylko na temperaturze.

  domain: automation
  author: Szwajowy
  source_url: https://github.com/Szwajowy/homeassistant/blob/master/blueprints/automation/szwajowy/window_weather_guardian.yaml
  homeassistant:
    min_version: "2024.10.0"

  input:
    # =========================================================================
    # 🪟 SEKCJA 1: OKNA
    # =========================================================================
    windows_section:
      name: "🪟 Okna"
      icon: mdi:window-closed
      description: "Wybierz czujniki otwarcia okien do monitorowania."
      input:
        window_sensors:
          name: "📍 Czujniki okien"
          default: []
          selector:
            entity:
              domain: binary_sensor
              multiple: true

        windows_reaction_time_open:
          name: "⏱️ Debounce otwarcia"
          description: "Okna muszą być otwarte tyle czasu, by wywołać reakcję."
          default:
            hours: 0
            minutes: 0
            seconds: 20
          selector:
            time:

        windows_reaction_time_close:
          name: "⏱️ Debounce zamknięcia"
          description: "Okna muszą być zamknięte tyle czasu, by wywołać reakcję."
          default:
            hours: 0
            minutes: 0
            seconds: 20
          selector:
            time:

    # =========================================================================
    # 🌦️ SEKCJA 2: POGODA
    # =========================================================================
    weather_section:
      name: "🌦️ Pogoda"
      icon: mdi:weather-partly-rainy
      description: "Konfiguracja warunków opadów i nocnego alertu okien."
      input:
        weather_entity:
          name: "🌤️ Encja weather"
          selector:
            entity:
              domain: weather

        precip_alert_enabled:
          name: "🌧️ Włącz alert opadów dla otwartych okien"
          default: true
          selector:
            boolean:

        alert_rain:
          name: "🌧️ Uwzględnij deszcz"
          default: true
          selector:
            boolean:

        alert_snow:
          name: "❄️ Uwzględnij śnieg"
          default: true
          selector:
            boolean:

        precip_forecast_minutes:
          name: "⏳ Ile minut naprzód sprawdzać forecast"
          description: "0 = tylko aktualna pogoda (bez forecast)."
          default: 60
          selector:
            number:
              min: 0
              max: 360
              step: 5
              unit_of_measurement: "min"
              mode: slider

        night_mode_schedule:
          name: "🌙 Harmonogram nocy (opcjonalny)"
          description: "Jeśli pusty, noc = sun.sun poniżej horyzontu."
          default: ""
          selector:
            entity:
              domain: schedule

        night_mode_entity:
          name: "🌙 Encja nocy (opcjonalna)"
          description: "Gdy on/true/home, traktowane jako noc."
          default: ""
          selector:
            entity:
              filter:
                - domain: binary_sensor
                - domain: input_boolean

    # =========================================================================
    # 👥 SEKCJA 3: OBECNOŚĆ
    # =========================================================================
    presence_section:
      name: "👥 Obecność"
      icon: mdi:account-group
      collapsed: true
      description: "Alert, gdy wszyscy opuścili dom i okna zostały otwarte."
      input:
        away_alert_enabled:
          name: "🏝️ Włącz alert all-away + otwarte okna"
          default: true
          selector:
            boolean:

        people_entities:
          name: "👤 Osoby do monitorowania"
          default: []
          selector:
            entity:
              domain: person
              multiple: true

        away_override_entity:
          name: "🧷 Dodatkowa encja aktywująca all-away (opcjonalna)"
          default: ""
          selector:
            entity:
              filter:
                - domain: binary_sensor
                - domain: input_boolean

    # =========================================================================
    # 🌡️ SEKCJA 4: DORADCA WIETRZENIA
    # =========================================================================
    advisor_section:
      name: "🌡️ Doradca wietrzenia"
      icon: mdi:air-filter
      collapsed: true
      description: "Podpowiedzi kiedy warto otworzyć lub zamknąć okna. Czujniki mogą być automatycznie mapowane po pomieszczeniach (area)."
      input:
        advisor_enabled:
          name: "🧠 Włącz doradcę"
          default: true
          selector:
            boolean:

        advisor_check_interval_minutes:
          name: "🔁 Co ile minut sprawdzać doradcę"
          default: 10
          selector:
            number:
              min: 1
              max: 120
              step: 1
              unit_of_measurement: "min"
              mode: slider

        indoor_temperature_sensor:
          name: "🏠 Temperatura wewnętrzna (główna)"
          default: ""
          selector:
            entity:
              domain: sensor

        indoor_temperature_sensors:
          name: "🏠 Temperatury wewnętrzne pokojowe (wiele, opcjonalne)"
          description: "Jeśli przypiszesz encje do pomieszczeń, blueprint sam powiąże je z oknami po area."
          default: []
          selector:
            entity:
              domain: sensor
              multiple: true

        outdoor_temperature_sensor:
          name: "🌡️ Temperatura zewnętrzna"
          default: ""
          selector:
            entity:
              domain: sensor

        open_when_cooler_delta:
          name: "🟢 Otwórz gdy na zewnątrz chłodniej o min."
          default: 1.0
          selector:
            number:
              min: 0
              max: 10
              step: 0.1
              unit_of_measurement: "°C"
              mode: slider

        avoid_when_hotter_delta:
          name: "🔴 Zamknij / nie otwieraj gdy na zewnątrz cieplej o min."
          default: 1.0
          selector:
            number:
              min: 0
              max: 10
              step: 0.1
              unit_of_measurement: "°C"
              mode: slider

        allow_warming_when_indoor_below:
          name: "🧊 Wyjątek: pozwól dogrzać, jeśli w domu poniżej"
          default: 19.0
          selector:
            number:
              min: 10
              max: 25
              step: 0.5
              unit_of_measurement: "°C"
              mode: slider

        use_humidity_guard:
          name: "💧 Uwzględnij wilgotność"
          default: false
          selector:
            boolean:

        indoor_humidity_sensor:
          name: "🏠 Wilgotność wewnętrzna (opcjonalna)"
          default: ""
          selector:
            entity:
              domain: sensor

        indoor_humidity_sensors:
          name: "🏠 Wilgotności wewnętrzne pokojowe (wiele, opcjonalne)"
          description: "Opcjonalna lista do mapowania po pomieszczeniach (area)."
          default: []
          selector:
            entity:
              domain: sensor
              multiple: true

        outdoor_humidity_sensor:
          name: "🌦️ Wilgotność zewnętrzna (opcjonalna)"
          default: ""
          selector:
            entity:
              domain: sensor

        humidity_outdoor_higher_by:
          name: "💧 Blokuj otwieranie gdy wilgotność zewn. wyższa o"
          default: 10
          selector:
            number:
              min: 0
              max: 40
              step: 1
              unit_of_measurement: "%"
              mode: slider

        use_co2_guard:
          name: "🫁 Uwzględnij CO2"
          default: false
          selector:
            boolean:

        indoor_co2_sensor:
          name: "🫁 Sensor CO2 (opcjonalny)"
          default: ""
          selector:
            entity:
              domain: sensor

        indoor_co2_sensors:
          name: "🫁 Sensory CO2 pokojowe (wiele, opcjonalne)"
          description: "Opcjonalna lista do mapowania po pomieszczeniach (area)."
          default: []
          selector:
            entity:
              domain: sensor
              multiple: true

        co2_threshold:
          name: "🫁 Próg CO2 dla rekomendacji otwarcia"
          default: 1000
          selector:
            number:
              min: 400
              max: 3000
              step: 50
              unit_of_measurement: "ppm"
              mode: slider

    # =========================================================================
    # 🔔 SEKCJA 5: POWIADOMIENIA
    # =========================================================================
    notifications_section:
      name: "🔔 Powiadomienia"
      icon: mdi:bell-ring
      description: "Wspólne kanały, treści i tagi do nadpisywania komunikatów."
      input:
        notify_entities:
          name: "📨 Encje notify"
          default: []
          selector:
            entity:
              domain: notify
              multiple: true

        actionable_enabled:
          name: "🎛️ Włącz przyciski drzemka/odrzuć (niekrytyczne)"
          default: true
          selector:
            boolean:

        snooze_minutes:
          name: "😴 Drzemka (minuty)"
          default: 20
          selector:
            number:
              min: 1
              max: 240
              step: 1
              unit_of_measurement: "min"
              mode: slider

        snooze_button_text:
          name: "🔘 Tekst przycisku Drzemka"
          default: "Przypomnij później"
          selector:
            text:

        dismiss_button_text:
          name: "🔘 Tekst przycisku Odrzuć"
          default: "OK"
          selector:
            text:

        notify_precip_enabled:
          name: "🌧️ Wysyłaj alert opadów"
          default: true
          selector:
            boolean:

        notify_away_enabled:
          name: "🏝️ Wysyłaj alert all-away"
          default: true
          selector:
            boolean:

        notify_advisor_enabled:
          name: "🧠 Wysyłaj rekomendacje doradcy"
          default: true
          selector:
            boolean:

        notify_summary_enabled:
          name: "🌙 Wysyłaj raport nocny"
          default: true
          selector:
            boolean:

        cycle_notification_tag:
          name: "🏷️ Tag powiadomień standardowych"
          default: "window_guardian_main"
          selector:
            text:

        critical_notification_tag:
          name: "🏷️ Tag powiadomień krytycznych"
          default: "window_guardian_critical"
          selector:
            text:

        title_precip:
          name: "📝 Tytuł: opady"
          default: "🌧️ Uwaga: opady i otwarte okna"
          selector:
            text:

        message_precip:
          name: "📝 Treść: opady"
          description: "Placeholdery: {open_windows}, {weather_state}."
          default: "Wykryto ryzyko opadów ({weather_state}). Otwarte: {open_windows}."
          selector:
            text:
              multiline: true

        title_away:
          name: "📝 Tytuł: all-away"
          default: "🏝️ Wszyscy poza domem, okna otwarte"
          selector:
            text:

        message_away:
          name: "📝 Treść: all-away"
          description: "Placeholder: {open_windows}."
          default: "Dom jest pusty, a otwarte są: {open_windows}."
          selector:
            text:
              multiline: true

        title_advisor_open:
          name: "📝 Tytuł: doradca otwórz"
          default: "🟢 Dobra pora na wietrzenie"
          selector:
            text:

        message_advisor_open:
          name: "📝 Treść: doradca otwórz"
          description: "Placeholdery: {indoor_temp}, {outdoor_temp}, {open_windows}."
          default: "W domu {indoor_temp}°C, na zewnątrz {outdoor_temp}°C. Warto otworzyć okno."
          selector:
            text:
              multiline: true

        title_advisor_close:
          name: "📝 Tytuł: doradca zamknij"
          default: "🔴 Lepiej zamknąć okna"
          selector:
            text:

        message_advisor_close:
          name: "📝 Treść: doradca zamknij"
          description: "Placeholdery: {indoor_temp}, {outdoor_temp}, {open_windows}."
          default: "W domu {indoor_temp}°C, na zewnątrz {outdoor_temp}°C. Lepiej zamknąć: {open_windows}."
          selector:
            text:
              multiline: true

        title_summary:
          name: "📝 Tytuł: raport nocny"
          default: "🌙 Raport okien"
          selector:
            text:

        message_summary_open:
          name: "📝 Treść: raport (otwarte)"
          description: "Placeholder: {open_windows}."
          default: "Nocny raport: nadal otwarte są: {open_windows}."
          selector:
            text:
              multiline: true

        message_summary_closed:
          name: "📝 Treść: raport (zamknięte)"
          default: "Nocny raport: wszystkie monitorowane okna są zamknięte."
          selector:
            text:
              multiline: true

    # =========================================================================
    # 🔕 SEKCJA 6: CISZA I WYJĄTKI
    # =========================================================================
    quiet_section:
      name: "🔕 Cisza i wyjątki"
      icon: mdi:bell-off
      collapsed: true
      description: "Wyciszanie przez encję/schedule z możliwością wyjątków dla typów alertów."
      input:
        quiet_enabled:
          name: "🔕 Włącz mechanizm ciszy"
          default: false
          selector:
            boolean:

        quiet_entity:
          name: "🧷 Encja ciszy (opcjonalna)"
          default: ""
          selector:
            entity:
              filter:
                - domain: binary_sensor
                - domain: input_boolean

        quiet_schedule_entities:
          name: "🗓️ Harmonogramy ciszy (opcjonalne)"
          default: []
          selector:
            entity:
              domain: schedule
              multiple: true

        bypass_quiet_precip:
          name: "🚨 Opady ignorują ciszę"
          default: true
          selector:
            boolean:

        bypass_quiet_away:
          name: "🏝️ All-away ignoruje ciszę"
          default: false
          selector:
            boolean:

        bypass_quiet_advisor:
          name: "🧠 Doradca ignoruje ciszę"
          default: false
          selector:
            boolean:

        bypass_quiet_summary:
          name: "🌙 Raport nocny ignoruje ciszę"
          default: false
          selector:
            boolean:

    # =========================================================================
    # 🔊 SEKCJA 7: TTS
    # =========================================================================
    tts_section:
      name: "🔊 TTS"
      icon: mdi:text-to-speech
      collapsed: true
      description: "Opcjonalne komunikaty głosowe z osobnym harmonogramem aktywności."
      input:
        tts_enabled:
          name: "🔊 Włącz TTS"
          default: false
          selector:
            boolean:

        tts_engine_entity:
          name: "🗣️ Encja TTS"
          default: ""
          selector:
            entity:
              domain: tts

        tts_media_player_entity:
          name: "📢 Media player"
          default: ""
          selector:
            entity:
              domain: media_player

        tts_schedule_entities:
          name: "🗓️ Harmonogram TTS (opcjonalny)"
          description: "Gdy pusty, TTS może działać zawsze."
          default: []
          selector:
            entity:
              domain: schedule
              multiple: true

        tts_for_precip:
          name: "🌧️ TTS dla opadów"
          default: true
          selector:
            boolean:

        tts_for_away:
          name: "🏝️ TTS dla all-away"
          default: false
          selector:
            boolean:

        tts_for_advisor:
          name: "🧠 TTS dla doradcy"
          default: false
          selector:
            boolean:

        tts_for_summary:
          name: "🌙 TTS dla raportu nocnego"
          default: false
          selector:
            boolean:

    # =========================================================================
    # 🌙 SEKCJA 8: RAPORT NOCNY
    # =========================================================================
    summary_section:
      name: "🌙 Raport nocny"
      icon: mdi:weather-night
      collapsed: true
      description: "Jednorazowy raport o stanie okien o zadanej porze lub przy starcie harmonogramu."
      input:
        summary_enabled:
          name: "🌙 Włącz raport nocny"
          default: true
          selector:
            boolean:

        summary_time:
          name: "🕘 Godzina raportu"
          default: "22:30:00"
          selector:
            time:

        summary_schedule_entity:
          name: "🗓️ Harmonogram raportu (opcjonalny)"
          description: "Gdy przejdzie w stan on, wyśle raport."
          default: ""
          selector:
            entity:
              domain: schedule

    # =========================================================================
    # 🔧 SEKCJA 9: ZAAWANSOWANE
    # =========================================================================
    advanced_section:
      name: "🔧 Zaawansowane"
      icon: mdi:cog
      collapsed: true
      input:
        enable_logging:
          name: "📝 Włącz logbook debug"
          default: false
          selector:
            boolean:

        blocking_condition:
          name: "🚫 Globalny warunek blokujący"
          default: []
          selector:
            condition:

mode: parallel
max: 20
max_exceeded: silent

trigger_variables:
  summary_schedule_entity_input: !input summary_schedule_entity

triggers:
  - trigger: state
    entity_id: !input window_sensors
    id: state_change
    for: !input windows_reaction_time_open

  - trigger: state
    entity_id: !input window_sensors
    id: state_change
    for: !input windows_reaction_time_close

  - trigger: state
    entity_id: !input weather_entity
    id: state_change

  - trigger: state
    entity_id: !input people_entities
    id: state_change

  - trigger: time_pattern
    minutes: "/5"
    id: heartbeat

  - trigger: time
    at: !input summary_time
    id: nightly_summary

  - trigger: template
    value_template: >
      {{ summary_schedule_entity_input not in ['', none] and is_state(summary_schedule_entity_input, 'on') }}
    id: nightly_summary

conditions: !input blocking_condition

actions:
  - variables:
      v_enable_logging: !input enable_logging

      v_window_sensors: !input window_sensors

      v_weather_entity: !input weather_entity
      v_precip_alert_enabled: !input precip_alert_enabled
      v_alert_rain: !input alert_rain
      v_alert_snow: !input alert_snow
      v_precip_forecast_minutes: !input precip_forecast_minutes
      v_night_mode_schedule: !input night_mode_schedule
      v_night_mode_entity: !input night_mode_entity

      v_away_alert_enabled: !input away_alert_enabled
      v_people_entities: !input people_entities
      v_away_override_entity: !input away_override_entity

      v_advisor_enabled: !input advisor_enabled
      v_advisor_check_interval_minutes: !input advisor_check_interval_minutes
      v_indoor_temperature_sensor: !input indoor_temperature_sensor
      v_indoor_temperature_sensors: !input indoor_temperature_sensors
      v_outdoor_temperature_sensor: !input outdoor_temperature_sensor
      v_open_when_cooler_delta: !input open_when_cooler_delta
      v_avoid_when_hotter_delta: !input avoid_when_hotter_delta
      v_allow_warming_when_indoor_below: !input allow_warming_when_indoor_below
      v_use_humidity_guard: !input use_humidity_guard
      v_indoor_humidity_sensor: !input indoor_humidity_sensor
      v_indoor_humidity_sensors: !input indoor_humidity_sensors
      v_outdoor_humidity_sensor: !input outdoor_humidity_sensor
      v_humidity_outdoor_higher_by: !input humidity_outdoor_higher_by
      v_use_co2_guard: !input use_co2_guard
      v_indoor_co2_sensor: !input indoor_co2_sensor
      v_indoor_co2_sensors: !input indoor_co2_sensors
      v_co2_threshold: !input co2_threshold

      v_notify_entities: !input notify_entities
      v_actionable_enabled: !input actionable_enabled
      v_snooze_minutes: !input snooze_minutes
      v_snooze_button_text: !input snooze_button_text
      v_dismiss_button_text: !input dismiss_button_text
      v_notify_precip_enabled: !input notify_precip_enabled
      v_notify_away_enabled: !input notify_away_enabled
      v_notify_advisor_enabled: !input notify_advisor_enabled
      v_notify_summary_enabled: !input notify_summary_enabled
      v_summary_enabled: !input summary_enabled
      v_cycle_notification_tag: !input cycle_notification_tag
      v_critical_notification_tag: !input critical_notification_tag
      v_title_precip: !input title_precip
      v_message_precip: !input message_precip
      v_title_away: !input title_away
      v_message_away: !input message_away
      v_title_advisor_open: !input title_advisor_open
      v_message_advisor_open: !input message_advisor_open
      v_title_advisor_close: !input title_advisor_close
      v_message_advisor_close: !input message_advisor_close
      v_title_summary: !input title_summary
      v_message_summary_open: !input message_summary_open
      v_message_summary_closed: !input message_summary_closed

      v_quiet_enabled: !input quiet_enabled
      v_quiet_entity: !input quiet_entity
      v_quiet_schedule_entities: !input quiet_schedule_entities
      v_bypass_quiet_precip: !input bypass_quiet_precip
      v_bypass_quiet_away: !input bypass_quiet_away
      v_bypass_quiet_advisor: !input bypass_quiet_advisor
      v_bypass_quiet_summary: !input bypass_quiet_summary

      v_tts_enabled: !input tts_enabled
      v_tts_engine_entity: !input tts_engine_entity
      v_tts_media_player_entity: !input tts_media_player_entity
      v_tts_schedule_entities: !input tts_schedule_entities
      v_tts_for_precip: !input tts_for_precip
      v_tts_for_away: !input tts_for_away
      v_tts_for_advisor: !input tts_for_advisor
      v_tts_for_summary: !input tts_for_summary

      open_windows_entities: >
        {% set ns = namespace(lst=[]) %}
        {% for e in expand(v_window_sensors) %}
          {% if e.state in ['on', 'open', 'tilted'] %}
            {% set ns.lst = ns.lst + [e.entity_id] %}
          {% endif %}
        {% endfor %}
        {{ ns.lst }}
      open_windows_count: "{{ open_windows_entities | length }}"
      open_windows_names: >
        {% set ns = namespace(lst=[]) %}
        {% for e in expand(v_window_sensors) %}
          {% if e.state in ['on', 'open', 'tilted'] %}
            {% set ns.lst = ns.lst + [(e.name if e.name is not none else e.entity_id)] %}
          {% endif %}
        {% endfor %}
        {{ ns.lst | join(', ') if (ns.lst | length) > 0 else 'brak' }}
      open_windows_grouped: >
        {% set areas = namespace(ids=[]) %}
        {% for e in expand(v_window_sensors) %}
          {% if e.state in ['on', 'open', 'tilted'] %}
            {% set aid = area_id(e.entity_id) if area_id(e.entity_id) is not none else '__no_area__' %}
            {% if aid not in areas.ids %}
              {% set areas.ids = areas.ids + [aid] %}
            {% endif %}
          {% endif %}
        {% endfor %}
        {% set groups = namespace(lines=[]) %}
        {% for aid in areas.ids %}
          {% set ns = namespace(names=[]) %}
          {% for e in expand(v_window_sensors) %}
            {% if e.state in ['on', 'open', 'tilted'] %}
              {% set eaid = area_id(e.entity_id) if area_id(e.entity_id) is not none else '__no_area__' %}
              {% if eaid == aid %}
                {% set ns.names = ns.names + [(e.name if e.name is not none else e.entity_id)] %}
              {% endif %}
            {% endif %}
          {% endfor %}
          {% set label = (area_name(aid) if aid != '__no_area__' else 'Bez przypisanego pomieszczenia') %}
          {% set groups.lines = groups.lines + [label ~ ': ' ~ (ns.names | join(', '))] %}
        {% endfor %}
        {{ groups.lines | join(' | ') if (groups.lines | length) > 0 else 'brak' }}
      open_window_area_ids: >
        {% set ns = namespace(ids=[]) %}
        {% for e in expand(v_window_sensors) %}
          {% if e.state in ['on', 'open', 'tilted'] %}
            {% set aid = area_id(e.entity_id) %}
            {% if aid is not none and aid not in ns.ids %}
              {% set ns.ids = ns.ids + [aid] %}
            {% endif %}
          {% endif %}
        {% endfor %}
        {{ ns.ids }}

      someone_home: "{{ (v_people_entities | length > 0) and ((v_people_entities | select('is_state', 'home') | list | length) > 0) }}"
      away_override_on: >
        {% if v_away_override_entity in ['', none] %}
          false
        {% else %}
          {{ states(v_away_override_entity) in ['on', 'true', 'home'] }}
        {% endif %}
      all_away: "{{ (v_people_entities | length > 0 and not someone_home) or away_override_on }}"

      quiet_by_entity: >
        {% if v_quiet_entity in ['', none] %}
          false
        {% else %}
          {{ states(v_quiet_entity) in ['on', 'true', 'home'] }}
        {% endif %}
      quiet_by_schedule: >
        {% set ns = namespace(active=false) %}
        {% for sch in v_quiet_schedule_entities %}
          {% if is_state(sch, 'on') %}
            {% set ns.active = true %}
          {% endif %}
        {% endfor %}
        {{ ns.active }}
      quiet_active: "{{ v_quiet_enabled and (quiet_by_entity or quiet_by_schedule) }}"

      allow_precip_notifications: "{{ (not quiet_active) or v_bypass_quiet_precip }}"
      allow_away_notifications: "{{ (not quiet_active) or v_bypass_quiet_away }}"
      allow_advisor_notifications: "{{ (not quiet_active) or v_bypass_quiet_advisor }}"
      allow_summary_notifications: "{{ (not quiet_active) or v_bypass_quiet_summary }}"

      tts_allowed: >
        {% if v_tts_schedule_entities | length == 0 %}
          true
        {% else %}
          {% set ns = namespace(active=false) %}
          {% for sch in v_tts_schedule_entities %}
            {% if is_state(sch, 'on') %}
              {% set ns.active = true %}
            {% endif %}
          {% endfor %}
          {{ ns.active }}
        {% endif %}

      night_active: >
        {% set by_schedule = (v_night_mode_schedule not in ['', none] and is_state(v_night_mode_schedule, 'on')) %}
        {% set by_entity = (v_night_mode_entity not in ['', none] and states(v_night_mode_entity) in ['on', 'true', 'home']) %}
        {% if v_night_mode_schedule in ['', none] and v_night_mode_entity in ['', none] %}
          {{ is_state('sun.sun', 'below_horizon') }}
        {% else %}
          {{ by_schedule or by_entity }}
        {% endif %}

      weather_state: "{{ states(v_weather_entity) }}"
      precip_now_rain: "{{ weather_state in ['rainy', 'pouring', 'lightning-rainy'] }}"
      precip_now_snow: "{{ weather_state in ['snowy', 'snowy-rainy'] }}"

      precip_soon_rain: >
        {% if (v_precip_forecast_minutes | int(0)) <= 0 %}
          false
        {% else %}
          {% set ns = namespace(hit=false) %}
          {% set horizon = as_timestamp(now()) + (v_precip_forecast_minutes | int(0)) * 60 %}
          {% for f in state_attr(v_weather_entity, 'forecast') or [] %}
            {% set c = f.condition if f.condition is defined else '' %}
            {% set ts = as_timestamp(f.datetime if f.datetime is defined else none, 0) %}
            {% if ts > 0 and ts <= horizon and c in ['rainy', 'pouring', 'lightning-rainy'] %}
              {% set ns.hit = true %}
            {% endif %}
          {% endfor %}
          {{ ns.hit }}
        {% endif %}

      precip_soon_snow: >
        {% if (v_precip_forecast_minutes | int(0)) <= 0 %}
          false
        {% else %}
          {% set ns = namespace(hit=false) %}
          {% set horizon = as_timestamp(now()) + (v_precip_forecast_minutes | int(0)) * 60 %}
          {% for f in state_attr(v_weather_entity, 'forecast') or [] %}
            {% set c = f.condition if f.condition is defined else '' %}
            {% set ts = as_timestamp(f.datetime if f.datetime is defined else none, 0) %}
            {% if ts > 0 and ts <= horizon and c in ['snowy', 'snowy-rainy'] %}
              {% set ns.hit = true %}
            {% endif %}
          {% endfor %}
          {{ ns.hit }}
        {% endif %}

      precip_detected: >
        {{
          (v_alert_rain and (precip_now_rain or precip_soon_rain))
          or
          (v_alert_snow and (precip_now_snow or precip_soon_snow))
        }}

      has_indoor_multi_temp: "{{ v_indoor_temperature_sensors | length > 0 }}"
      indoor_temp: >
        {% if has_indoor_multi_temp %}
          {% set ns = namespace(vals=[]) %}
          {% if open_window_area_ids | length > 0 %}
            {% for s in expand(v_indoor_temperature_sensors) %}
              {% if area_id(s.entity_id) in open_window_area_ids %}
                {% set ns.vals = ns.vals + [s.state | float(0)] %}
              {% endif %}
            {% endfor %}
          {% endif %}
          {% if ns.vals | length == 0 %}
            {% set ns.vals = expand(v_indoor_temperature_sensors) | map(attribute='state') | map('float', 0) | list %}
          {% endif %}
          {{ (ns.vals | sum / (ns.vals | length if (ns.vals | length) > 0 else 1)) | round(1) }}
        {% elif v_indoor_temperature_sensor not in ['', none] %}
          {{ states(v_indoor_temperature_sensor) | float(0) | round(1) }}
        {% else %}
          {{ 0 }}
        {% endif %}
      outdoor_temp: >
        {% if v_outdoor_temperature_sensor not in ['', none] %}
          {{ states(v_outdoor_temperature_sensor) | float(0) | round(1) }}
        {% else %}
          {{ 0 }}
        {% endif %}
      has_temp_for_advisor: >
        {{
          v_outdoor_temperature_sensor not in ['', none]
          and
          (has_indoor_multi_temp or v_indoor_temperature_sensor not in ['', none])
        }}

      indoor_humidity: >
        {% if v_indoor_humidity_sensors | length > 0 %}
          {% set ns = namespace(vals=[]) %}
          {% if open_window_area_ids | length > 0 %}
            {% for s in expand(v_indoor_humidity_sensors) %}
              {% if area_id(s.entity_id) in open_window_area_ids %}
                {% set ns.vals = ns.vals + [s.state | float(0)] %}
              {% endif %}
            {% endfor %}
          {% endif %}
          {% if ns.vals | length == 0 %}
            {% set ns.vals = expand(v_indoor_humidity_sensors) | map(attribute='state') | map('float', 0) | list %}
          {% endif %}
          {{ (ns.vals | sum / (ns.vals | length if (ns.vals | length) > 0 else 1)) | round(1) }}
        {% elif v_indoor_humidity_sensor not in ['', none] %}
          {{ states(v_indoor_humidity_sensor) | float(0) }}
        {% else %}
          {{ 0 }}
        {% endif %}
      outdoor_humidity: >
        {% if v_outdoor_humidity_sensor not in ['', none] %}
          {{ states(v_outdoor_humidity_sensor) | float(0) }}
        {% else %}
          {{ 0 }}
        {% endif %}
      humidity_blocks_opening: >
        {% if v_use_humidity_guard and v_indoor_humidity_sensor not in ['', none] and v_outdoor_humidity_sensor not in ['', none] %}
          {{ (outdoor_humidity - indoor_humidity) >= (v_humidity_outdoor_higher_by | float(0)) }}
        {% else %}
          false
        {% endif %}

      co2_high: >
        {% if v_use_co2_guard and v_indoor_co2_sensors | length > 0 %}
          {% set ns = namespace(vals=[]) %}
          {% if open_window_area_ids | length > 0 %}
            {% for s in expand(v_indoor_co2_sensors) %}
              {% if area_id(s.entity_id) in open_window_area_ids %}
                {% set ns.vals = ns.vals + [s.state | float(0)] %}
              {% endif %}
            {% endfor %}
          {% endif %}
          {% if ns.vals | length == 0 %}
            {% set ns.vals = expand(v_indoor_co2_sensors) | map(attribute='state') | map('float', 0) | list %}
          {% endif %}
          {{ (ns.vals | max(0)) >= (v_co2_threshold | float(0)) }}
        {% elif v_use_co2_guard and v_indoor_co2_sensor not in ['', none] %}
          {{ (states(v_indoor_co2_sensor) | float(0)) >= (v_co2_threshold | float(0)) }}
        {% else %}
          false
        {% endif %}

      delta_cool: "{{ (indoor_temp - outdoor_temp) | round(1) }}"
      delta_hot: "{{ (outdoor_temp - indoor_temp) | round(1) }}"

      advisor_recommend_open: >
        {{
          v_advisor_enabled
          and has_temp_for_advisor
          and (open_windows_count | int(0) == 0)
          and not precip_detected
          and not humidity_blocks_opening
          and (
            (delta_cool | float(0)) >= (v_open_when_cooler_delta | float(0))
            or co2_high
          )
        }}

      advisor_recommend_close: >
        {{
          v_advisor_enabled
          and has_temp_for_advisor
          and (open_windows_count | int(0) > 0)
          and (
            precip_detected
            or humidity_blocks_opening
            or (
              (delta_hot | float(0)) >= (v_avoid_when_hotter_delta | float(0))
              and (indoor_temp | float(0)) > (v_allow_warming_when_indoor_below | float(0))
            )
          )
        }}

      advisor_tick: "{{ (now().minute % (v_advisor_check_interval_minutes | int(1))) == 0 }}"

      should_send_precip: "{{ v_precip_alert_enabled and v_notify_precip_enabled and allow_precip_notifications and night_active and (open_windows_count | int(0) > 0) and precip_detected }}"
      should_send_away: "{{ v_away_alert_enabled and v_notify_away_enabled and allow_away_notifications and (open_windows_count | int(0) > 0) and all_away }}"
      should_send_advisor_open: "{{ v_notify_advisor_enabled and allow_advisor_notifications and advisor_recommend_open and (trigger.id != 'heartbeat' or advisor_tick) }}"
      should_send_advisor_close: "{{ v_notify_advisor_enabled and allow_advisor_notifications and advisor_recommend_close and (trigger.id != 'heartbeat' or advisor_tick) }}"

      msg_precip: >
        {% set t = v_message_precip %}
        {% set t = t | replace('{open_windows}', open_windows_grouped) %}
        {% set t = t | replace('{weather_state}', weather_state) %}
        {{ t }}
      msg_away: >
        {% set t = v_message_away %}
        {% set t = t | replace('{open_windows}', open_windows_grouped) %}
        {{ t }}
      msg_advisor_open: >
        {% set t = v_message_advisor_open %}
        {% set t = t | replace('{indoor_temp}', indoor_temp | string) %}
        {% set t = t | replace('{outdoor_temp}', outdoor_temp | string) %}
        {% set t = t | replace('{open_windows}', open_windows_names) %}
        {{ t }}
      msg_advisor_close: >
        {% set t = v_message_advisor_close %}
        {% set t = t | replace('{indoor_temp}', indoor_temp | string) %}
        {% set t = t | replace('{outdoor_temp}', outdoor_temp | string) %}
        {% set t = t | replace('{open_windows}', open_windows_grouped) %}
        {{ t }}

      action_snooze: "WINDOW_SNOOZE_{{ context.id }}"
      action_dismiss: "WINDOW_DISMISS_{{ context.id }}"

  - if: "{{ v_enable_logging }}"
    then:
      - action: logbook.log
        data:
          name: "🪟 Window Guardian"
          message: "Trigger={{ trigger.id }} open={{ open_windows_count }} precip={{ precip_detected }} away={{ all_away }} quiet={{ quiet_active }}"

  - choose:
      - conditions:
          - "{{ trigger.id in ['state_change', 'heartbeat'] }}"
        sequence:
          - choose:
              - conditions:
                  - "{{ should_send_precip }}"
                sequence:
                  - repeat:
                      for_each: "{{ v_notify_entities }}"
                      sequence:
                        - action: notify.send_message
                          continue_on_error: true
                          target:
                            entity_id: "{{ repeat.item }}"
                          data:
                            title: "{{ v_title_precip }}"
                            message: "{{ msg_precip }}"
                            data:
                              tag: "{{ v_critical_notification_tag }}"
                              group: window_guardian_critical
                              priority: high
                              ttl: 0
                              importance: high
                  - if:
                      - "{{ v_tts_enabled and v_tts_for_precip and tts_allowed }}"
                      - "{{ v_tts_engine_entity not in ['', none] }}"
                      - "{{ v_tts_media_player_entity not in ['', none] }}"
                    then:
                      - action: tts.speak
                        continue_on_error: true
                        target:
                          entity_id: "{{ v_tts_engine_entity }}"
                        data:
                          media_player_entity_id: "{{ v_tts_media_player_entity }}"
                          message: "{{ msg_precip }}"

              - conditions:
                  - "{{ should_send_away }}"
                sequence:
                  - repeat:
                      for_each: "{{ v_notify_entities }}"
                      sequence:
                        - action: notify.send_message
                          continue_on_error: true
                          target:
                            entity_id: "{{ repeat.item }}"
                          data:
                            title: "{{ v_title_away }}"
                            message: "{{ msg_away }}"
                            data:
                              tag: "{{ v_cycle_notification_tag }}"
                              group: window_guardian_main
                              actions: >
                                {% if v_actionable_enabled %}
                                  [
                                    {"action": "{{ action_snooze }}", "title": "{{ v_snooze_button_text }}"},
                                    {"action": "{{ action_dismiss }}", "title": "{{ v_dismiss_button_text }}"}
                                  ]
                                {% else %}
                                  []
                                {% endif %}
                  - if:
                      - "{{ v_actionable_enabled }}"
                    then:
                      - wait_for_trigger:
                          - trigger: event
                            event_type: mobile_app_notification_action
                        timeout:
                          minutes: "{{ v_snooze_minutes }}"
                        continue_on_timeout: true
                      - choose:
                          - conditions:
                              - "{{ wait.trigger != none and wait.trigger.event.data.action == action_snooze }}"
                            sequence:
                              - delay:
                                  minutes: "{{ v_snooze_minutes }}"
                              - repeat:
                                  for_each: "{{ v_notify_entities }}"
                                  sequence:
                                    - action: notify.send_message
                                      continue_on_error: true
                                      target:
                                        entity_id: "{{ repeat.item }}"
                                      data:
                                        title: "{{ v_title_away }}"
                                        message: "{{ msg_away }}"
                                        data:
                                          tag: "{{ v_cycle_notification_tag }}"
                                          group: window_guardian_main
                  - if:
                      - "{{ v_tts_enabled and v_tts_for_away and tts_allowed }}"
                      - "{{ v_tts_engine_entity not in ['', none] }}"
                      - "{{ v_tts_media_player_entity not in ['', none] }}"
                    then:
                      - action: tts.speak
                        continue_on_error: true
                        target:
                          entity_id: "{{ v_tts_engine_entity }}"
                        data:
                          media_player_entity_id: "{{ v_tts_media_player_entity }}"
                          message: "{{ msg_away }}"

              - conditions:
                  - "{{ should_send_advisor_close }}"
                sequence:
                  - repeat:
                      for_each: "{{ v_notify_entities }}"
                      sequence:
                        - action: notify.send_message
                          continue_on_error: true
                          target:
                            entity_id: "{{ repeat.item }}"
                          data:
                            title: "{{ v_title_advisor_close }}"
                            message: "{{ msg_advisor_close }}"
                            data:
                              tag: "{{ v_cycle_notification_tag }}"
                              group: window_guardian_main
                              actions: >
                                {% if v_actionable_enabled %}
                                  [
                                    {"action": "{{ action_snooze }}", "title": "{{ v_snooze_button_text }}"},
                                    {"action": "{{ action_dismiss }}", "title": "{{ v_dismiss_button_text }}"}
                                  ]
                                {% else %}
                                  []
                                {% endif %}
                  - if:
                      - "{{ v_actionable_enabled }}"
                    then:
                      - wait_for_trigger:
                          - trigger: event
                            event_type: mobile_app_notification_action
                        timeout:
                          minutes: "{{ v_snooze_minutes }}"
                        continue_on_timeout: true
                      - choose:
                          - conditions:
                              - "{{ wait.trigger != none and wait.trigger.event.data.action == action_snooze }}"
                            sequence:
                              - delay:
                                  minutes: "{{ v_snooze_minutes }}"
                              - repeat:
                                  for_each: "{{ v_notify_entities }}"
                                  sequence:
                                    - action: notify.send_message
                                      continue_on_error: true
                                      target:
                                        entity_id: "{{ repeat.item }}"
                                      data:
                                        title: "{{ v_title_advisor_close }}"
                                        message: "{{ msg_advisor_close }}"
                                        data:
                                          tag: "{{ v_cycle_notification_tag }}"
                                          group: window_guardian_main
                  - if:
                      - "{{ v_tts_enabled and v_tts_for_advisor and tts_allowed }}"
                      - "{{ v_tts_engine_entity not in ['', none] }}"
                      - "{{ v_tts_media_player_entity not in ['', none] }}"
                    then:
                      - action: tts.speak
                        continue_on_error: true
                        target:
                          entity_id: "{{ v_tts_engine_entity }}"
                        data:
                          media_player_entity_id: "{{ v_tts_media_player_entity }}"
                          message: "{{ msg_advisor_close }}"

              - conditions:
                  - "{{ should_send_advisor_open }}"
                sequence:
                  - repeat:
                      for_each: "{{ v_notify_entities }}"
                      sequence:
                        - action: notify.send_message
                          continue_on_error: true
                          target:
                            entity_id: "{{ repeat.item }}"
                          data:
                            title: "{{ v_title_advisor_open }}"
                            message: "{{ msg_advisor_open }}"
                            data:
                              tag: "{{ v_cycle_notification_tag }}"
                              group: window_guardian_main
                              actions: >
                                {% if v_actionable_enabled %}
                                  [
                                    {"action": "{{ action_snooze }}", "title": "{{ v_snooze_button_text }}"},
                                    {"action": "{{ action_dismiss }}", "title": "{{ v_dismiss_button_text }}"}
                                  ]
                                {% else %}
                                  []
                                {% endif %}
                  - if:
                      - "{{ v_actionable_enabled }}"
                    then:
                      - wait_for_trigger:
                          - trigger: event
                            event_type: mobile_app_notification_action
                        timeout:
                          minutes: "{{ v_snooze_minutes }}"
                        continue_on_timeout: true
                      - choose:
                          - conditions:
                              - "{{ wait.trigger != none and wait.trigger.event.data.action == action_snooze }}"
                            sequence:
                              - delay:
                                  minutes: "{{ v_snooze_minutes }}"
                              - repeat:
                                  for_each: "{{ v_notify_entities }}"
                                  sequence:
                                    - action: notify.send_message
                                      continue_on_error: true
                                      target:
                                        entity_id: "{{ repeat.item }}"
                                      data:
                                        title: "{{ v_title_advisor_open }}"
                                        message: "{{ msg_advisor_open }}"
                                        data:
                                          tag: "{{ v_cycle_notification_tag }}"
                                          group: window_guardian_main
                  - if:
                      - "{{ v_tts_enabled and v_tts_for_advisor and tts_allowed }}"
                      - "{{ v_tts_engine_entity not in ['', none] }}"
                      - "{{ v_tts_media_player_entity not in ['', none] }}"
                    then:
                      - action: tts.speak
                        continue_on_error: true
                        target:
                          entity_id: "{{ v_tts_engine_entity }}"
                        data:
                          media_player_entity_id: "{{ v_tts_media_player_entity }}"
                          message: "{{ msg_advisor_open }}"

      - conditions:
          - "{{ trigger.id == 'nightly_summary' }}"
          - "{{ v_summary_enabled and v_notify_summary_enabled and allow_summary_notifications }}"
        sequence:
          - variables:
              summary_message: >
                {% if (open_windows_count | int(0)) > 0 %}
                  {% set t = v_message_summary_open %}
                  {{ t | replace('{open_windows}', open_windows_names) }}
                {% else %}
                  {{ v_message_summary_closed }}
                {% endif %}
          - repeat:
              for_each: "{{ v_notify_entities }}"
              sequence:
                - action: notify.send_message
                  continue_on_error: true
                  target:
                    entity_id: "{{ repeat.item }}"
                  data:
                    title: "{{ v_title_summary }}"
                    message: "{{ summary_message }}"
                    data:
                      tag: "{{ v_cycle_notification_tag }}"
                      group: window_guardian_main
          - if:
              - "{{ v_tts_enabled and v_tts_for_summary and tts_allowed }}"
              - "{{ v_tts_engine_entity not in ['', none] }}"
              - "{{ v_tts_media_player_entity not in ['', none] }}"
            then:
              - action: tts.speak
                continue_on_error: true
                target:
                  entity_id: "{{ v_tts_engine_entity }}"
                data:
                  media_player_entity_id: "{{ v_tts_media_player_entity }}"
                  message: "{{ summary_message }}"
blueprint:
  name: "🪟 Smart Window Guardian — Okna, pogoda i rekomendacje"
  description: |
    ## 🪟 Inteligentny strażnik okien

    Blueprint monitoruje okna i wysyła rekomendacje/powiadomienia, gdy:
    - w nocy jest ryzyko opadów i okna są otwarte,
    - wszyscy opuścili dom i okna zostały otwarte,
    - warunki sugerują, że warto otworzyć / nie warto otwierać okien,
    - o zadanej porze ma zostać wysłany nocny raport otwartych okien.

    ## ⚡ Funkcje
    - 📨 Powiadomienia na wybrane encje `notify` z nadpisywaniem przez `tag`
    - 🌧️ Alert opadów (stan bieżący i prognoza z `weather.*`)
    - 🏝️ Alert "wszyscy poza domem + otwarte okno"
    - 🧠 Doradca wietrzenia (temperatura/wilgotność/CO2)
    - 🌙 Konfigurowalna cisza (schedule i/lub encja) z wyjątkami
    - 🔊 Opcjonalny TTS z własnym harmonogramem
    - 📋 Nocny raport otwartych okien

  domain: automation
  author: Szwajowy
  source_url: https://github.com/Szwajowy/homeassistant/blob/master/blueprints/automation/szwajowy/window_weather_guardian.yaml
  homeassistant:
    min_version: "2024.10.0"

  input:
    # =========================================================================
    # 🪟 SEKCJA 1: OKNA
    # =========================================================================
    windows_section:
      name: "🪟 Okna"
      icon: mdi:window-open-variant
      description: "Wybierz czujniki otwarcia okien."
      input:
        window_sensors:
          name: "📍 Czujniki okien"
          selector:
            entity:
              domain: binary_sensor
              multiple: true

        window_open_debounce_seconds:
          name: "⏱️ Debounce otwarcia"
          description: "Ile sekund okno ma być otwarte, by uznać zdarzenie."
          default: 30
          selector:
            number:
              min: 0
              max: 600
              step: 1
              unit_of_measurement: "s"
              mode: slider

    # =========================================================================
    # 🌦️ SEKCJA 2: POGODA
    # =========================================================================
    weather_section:
      name: "🌦️ Pogoda i opady"
      icon: mdi:weather-rainy
      collapsed: true
      input:
        weather_entity:
          name: "🌤️ Encja weather"
          description: "Np. weather.dom"
          default: ""
          selector:
            entity:
              domain: weather

        rain_alert_enabled:
          name: "🌧️ Włącz alert deszczu"
          default: true
